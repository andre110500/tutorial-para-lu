<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lu Studio - Contacto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="contenedor">
            <a href="index.html" class="logo">Lu Studio</a>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="proyectos.html">Proyectos</a></li>
                    <li><a href="contacto.html" class="activo">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero hero-pequeno">
        <div class="contenedor">
            <h1>Contactame</h1>
            <p>Completá el formulario y te respondo a la brevedad.</p>
        </div>
    </section>

    <section class="seccion">
        <div class="contenedor">
            <h2>Formulario de contacto</h2>
            <form action="#" method="POST">

                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Lu García" required>

                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="Ej: lu@ejemplo.com" required>

                <label for="telefono">Teléfono (opcional)</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej: 11 1234-5678">

                <label for="motivo">Motivo del contacto</label>
                <select id="motivo" name="motivo">
                    <option value="consulta">Consulta</option>
                    <option value="presupuesto">Pedir presupuesto</option>
                    <option value="colaboracion">Propuesta de colaboración</option>
                    <option value="otro">Otro</option>
                </select>

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribí tu mensaje acá..." required></textarea>

                <button type="submit" class="btn">Enviar mensaje</button>

            </form>
        </div>
    </section>

    <footer>
        <div class="contenedor">
            <p>&copy; 2026 Lu Studio. Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
</html>
